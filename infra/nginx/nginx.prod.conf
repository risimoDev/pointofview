worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  client_max_body_size 200m;

  upstream api     { server api:3000; }
  upstream web     { server web:3001; }
  # go2rtc runs with network_mode: host
  upstream go2rtc  { server host.docker.internal:1984; }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # TLS terminates on the VPS; this listener is only reachable via WireGuard
  server {
    listen 80;
    server_name _;
    include /etc/nginx/locations.inc;
  }
}
