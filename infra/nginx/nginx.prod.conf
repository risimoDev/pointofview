worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  client_max_body_size 5g;   # test-video uploads (admin) can be large

  # Docker's embedded DNS. Re-resolving upstream hostnames on a short TTL
  # (instead of a static "upstream {}" block resolved once at startup)
  # keeps nginx working after api/web containers are recreated with a new
  # IP by ./scripts/update.sh — otherwise nginx keeps the stale IP and
  # returns 502 until it's restarted.
  resolver 127.0.0.11 valid=10s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;
    include /etc/nginx/locations.inc;
  }
}
