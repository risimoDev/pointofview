# Mount this file to /etc/nginx/conf.d/tls.conf only when certs are present
# (init.sh --domain copies them to infra/nginx/ssl/). Otherwise omit it.

server {
  listen 443 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  include /etc/nginx/locations.inc;
}
